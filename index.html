<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Shirts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      margin-bottom: 30px;
    }
    .store {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 16px;
    }
    .card img {
      width: 100%;
      border-radius: 4px;
    }
    .card h2 {
      font-size: 1rem;
      margin: 10px 0 4px;
    }
    .card .price {
      color: #555;
      margin-bottom: 6px;
    }
    .card .stock {
      font-size: 0.9rem;
      margin-bottom: 10px;
      color: #333;
    }
    .out-of-stock {
      color: red;
      font-weight: bold;
    }
    .card select, .card button {
      padding: 6px 10px;
      margin: 4px;
      cursor: pointer;
    }
    .card button {
      background: #2c7be5;
      color: white;
      border: none;
      border-radius: 4px;
    }
    .card button:hover {
      background: #1a5ec4;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="t-shirts.js"></script>
</body>
</html>
